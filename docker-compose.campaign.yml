# Template for additional campaign instances.
#
# Usage — on the server:
#   mkdir /opt/mandate-campaign2
#   cd /opt/mandate-campaign2
#   git clone <repo-url> .
#   cp .env.campaign.example .env
#   # Edit .env: set CAMPAIGN_CONTAINER_NAME, POSTGRES_PASSWORD, SECRET_KEY, ADMIN_EMAIL
#   docker compose -f docker-compose.campaign.yml -p mandate-campaign2 up -d
#
# Then in campaign 1's directory:
#   - Add CAMPAIGN2_DOMAIN to .env
#   - Uncomment the matching site block in Caddyfile
#   - docker compose exec caddy caddy reload --config /etc/caddy/Caddyfile

services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: mandate
      POSTGRES_USER: petition
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petition -d mandate"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 384m
        reservations:
          memory: 128m

  web:
    build: .
    container_name: ${CAMPAIGN_CONTAINER_NAME}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://petition:${POSTGRES_PASSWORD}@db:5432/mandate
      SECRET_KEY: ${SECRET_KEY}
      UPLOAD_FOLDER: /app/uploads
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - uploads:/app/uploads
    networks:
      - default
      - proxy
    deploy:
      resources:
        limits:
          memory: 400m
        reservations:
          memory: 150m

volumes:
  postgres_data:
  uploads:

networks:
  proxy:
    external: true
    name: mandate-proxy
